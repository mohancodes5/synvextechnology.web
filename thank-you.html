<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thank you for submitting your project inquiry to Synvex Technology.">
  <title>Submission Successful | Synvex Technology</title>

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- CSS Link -->
  <link rel="stylesheet" href="style.css">

  <style>
    .thank-you-section {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      background-image: radial-gradient(circle at 50% 50%, rgba(0, 242, 254, 0.05) 0%, transparent 60%);
      padding: 2rem;
    }

    .thank-you-card {
      background: var(--bg-glass-card);
      border: 1px solid var(--border-glass);
      border-radius: 24px;
      padding: 4rem 3rem;
      max-width: 600px;
      width: 100%;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      position: relative;
      overflow: hidden;
    }

    .success-icon-wrapper {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: var(--accent-glow);
      border: 2px solid var(--border-glass-hover);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2.5rem auto;
      color: var(--accent-cyan);
      font-size: 2.8rem;
      position: relative;
      box-shadow: 0 0 30px var(--accent-glow);
      animation: check-bounce 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes check-bounce {
      0% { transform: scale(0); }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .thank-you-title {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 1.2rem;
      letter-spacing: -0.02em;
    }

    .thank-you-title span {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .thank-you-text {
      color: var(--text-secondary);
      font-size: 1.1rem;
      margin-bottom: 3rem;
      line-height: 1.6;
    }
  </style>

  <!-- Early theme script to prevent layout flashes -->
  <script>
    const theme = localStorage.getItem('theme');
    if (theme === 'light') {
      document.documentElement.classList.add('light-theme');
    }
  </script>
</head>
<body>

  <section class="thank-you-section">
    <div class="thank-you-card">
      <div class="success-icon-wrapper">
        <i class="fa-solid fa-circle-check"></i>
      </div>
      
      <h1 class="thank-you-title">Message <span>Received!</span></h1>
      
      <p class="thank-you-text">
        Thank you for contacting **Synvex Technology**. Your project inquiry has been successfully transmitted to our engineering team. 
        <br><br>
        We are reviewing your requirements and will reach out to you at the email or phone number provided within 24 business hours.
      </p>

      <a href="index.html" class="btn btn-primary">
        <i class="fa-solid fa-arrow-left"></i> Return to Homepage
      </a>
    </div>
  </section>

</body>
</html>
